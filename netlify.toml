[build]
  functions = "netlify/functions"
  # Skip the build if no deployable file changed in the commit. Migrations,
  # tests, eval cases, and root markdown docs don't affect the served site,
  # so a doc-only commit shouldn't burn a build minute.
  ignore = "git diff --quiet HEAD^ HEAD -- index.html login.html app.js styles.css data/ netlify/ demo.html demo.js demo-styles.css demo-data.json tasking.html tasking.js tasking-styles.css"

[functions]
  node_bundler = "esbuild"

# Phase 3 pull-queue endpoints. The function lives at
# /.netlify/functions/queue/<action>; this redirect exposes them at
# the cleaner /queue/<action> path the SPA and external callers use.
# status=200 is a rewrite (URL stays /queue/...), not a 301 redirect.
[[redirects]]
  from = "/queue/*"
  to = "/.netlify/functions/queue/:splat"
  status = 200
  force = true

# Background worker — processes pending query_history rows once per
# minute. Comment out until Bask ingest goes live.
# [[scheduled.functions]]
#   name = "worker"
#   schedule = "* * * * *"
